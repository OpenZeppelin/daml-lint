---
version: 2
# opt in to updates for ecosystems that are not yet GA.
enable-beta-ecosystems: true
updates:
  # Maintain dependencies for Cargo
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: 'chore(deps): '
    labels:
      - dependabot
      - dependencies
    open-pull-requests-limit: 5

